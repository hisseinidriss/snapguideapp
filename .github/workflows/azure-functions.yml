name: Deploy backend to Azure Functions

on:
  push:
    branches: [main]
    paths:
      - "azure-functions/**"
      - ".github/workflows/azure-functions.yml"
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: snapeguide1            # Linux Function App (supports ffmpeg for AI video)
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "azure-functions"
  NODE_VERSION: "20.x"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install production deps
        run: |
          pushd "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}"
          # Remove any committed lockfile — it can pin platform-specific
          # optional deps (ffmpeg/ffprobe binaries) to the dev machine's OS,
          # which means the Linux binaries never get installed on this runner.
          rm -f package-lock.json
          npm install --omit=dev --no-audit --no-fund --include=optional
          # Belt-and-suspenders: force the Linux x64 binary subpackages to be
          # present even if npm's optional-dep resolution skipped them.
          npm install --no-save --no-audit --no-fund \
            @ffmpeg-installer/linux-x64 \
            @ffprobe-installer/linux-x64
          # Verify the binaries actually exist before we ship the package.
          test -f node_modules/@ffmpeg-installer/linux-x64/ffmpeg
          test -f node_modules/@ffprobe-installer/linux-x64/ffprobe
          chmod +x node_modules/@ffmpeg-installer/linux-x64/ffmpeg \
                   node_modules/@ffprobe-installer/linux-x64/ffprobe
          popd

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true
