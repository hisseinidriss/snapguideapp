name: Deploy backend to Azure Functions

on:
  push:
    branches: [main]
    paths:
      - "azure-functions/**"
      - ".github/workflows/azure-functions.yml"
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: snapeguide1            # Linux Function App (supports ffmpeg for AI video)
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "azure-functions"
  NODE_VERSION: "20.x"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install production deps
        run: |
          pushd "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}"
          # Use `npm ci` when a lockfile exists (reproducible), otherwise fall
          # back to `npm install` so first-time deploys don't fail.
          if [ -f package-lock.json ]; then
            npm ci --omit=dev
          else
            npm install --omit=dev --no-audit --no-fund
          fi
          popd

      - name: Deploy to Azure Function App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
