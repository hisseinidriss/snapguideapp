name: Deploy backend to Azure Functions

on:
  push:
    branches: [main]
    paths:
      - "azure-functions/**"
      - ".github/workflows/azure-functions.yml"
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: snapeguide1            # Linux Function App (supports ffmpeg for AI video)
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "azure-functions"
  NODE_VERSION: "20.x"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install production deps and bundle ffmpeg
        run: |
          pushd "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}"
          npm install --omit=dev --no-audit --no-fund
          node scripts/install-ffmpeg.js
          test -f src/vendor/ffmpeg/linux-x64/ffmpeg
          test -f src/vendor/ffmpeg/linux-x64/ffprobe
          chmod +x src/vendor/ffmpeg/linux-x64/ffmpeg \
                   src/vendor/ffmpeg/linux-x64/ffprobe
          popd

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true
